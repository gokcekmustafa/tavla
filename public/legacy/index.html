<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tavla Legacy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell ref-shell">
    <header class="action-strip">
      <button type="button" class="strip-btn strip-exit">Cikis</button>
      <button type="button" class="strip-btn strip-lobby">Lobiye Don</button>
      <button id="new-game-btn" class="strip-btn strip-primary">Yeni Oyun</button>
      <button type="button" class="strip-btn strip-purple">Turnuva</button>
      <button type="button" class="strip-btn strip-dark">Radyo Sec</button>
      <button type="button" class="strip-btn strip-gold">Satin Al</button>
      <button type="button" class="strip-btn strip-sky">Duyurular</button>
      <button type="button" class="strip-btn strip-cyan">Siralama</button>
    </header>

    <section class="room-bar">IZMIR / Masa 14</section>

    <section class="arena-layout">
      <aside class="left-control-panel">
        <button type="button" class="panel-hero-btn">Masadan Kalk</button>

        <div class="controls-card panel-card">
          <p class="label">Oyun Modu</p>
          <label for="game-mode-select" class="control-label">Mod Secimi</label>
          <select id="game-mode-select" class="mode-select">
            <option value="local">Iki Oyuncu (Local)</option>
            <option value="bot">Bilgisayara Karsi</option>
          </select>

          <label class="control-inline" for="auto-roll-toggle">
            <input id="auto-roll-toggle" type="checkbox">
            Otomatik Zar At
          </label>

          <div class="toggle-list">
            <label class="control-inline"><input type="checkbox"> Sessiz Seyirci</label>
            <label class="control-inline"><input type="checkbox"> Otomatik Pas</label>
            <label class="control-inline"><input type="checkbox"> Otomatik Topla</label>
            <label class="control-inline"><input type="checkbox"> Sesli Uyari</label>
          </div>

          <div id="room-meta" class="room-meta" hidden>
            <p id="room-meta-code" class="room-meta-line"></p>
            <p id="room-meta-seat" class="room-meta-line"></p>
          </div>
        </div>

        <div class="panel-info-card">
          <p class="label">Sira</p>
          <p id="current-player" class="value">Beyaz</p>
          <p class="label mini-gap">Durum</p>
          <p id="status-text" class="status-text">Beyaz basliyor. Zar atarak oyunu baslat.</p>
          <p class="label mini-gap">Son Zar</p>
          <div id="dice-container" class="dice-container" aria-live="polite"></div>
        </div>
      </aside>

      <section class="table-wrap">
        <aside id="off-black" class="off-area black" data-off="black">
          <p class="off-title">Siyah Toplanan</p>
          <p id="off-black-count" class="off-count">0 / 15</p>
          <div id="off-black-stack" class="off-stack" aria-hidden="true"></div>
        </aside>

        <div id="board-grid" class="board-grid" aria-label="Tavla tahtasi"></div>
        <svg id="guide-layer" class="guide-layer" aria-hidden="true"></svg>
        <div id="center-dice-stage" class="center-dice-stage" aria-live="polite"></div>

        <aside id="off-white" class="off-area white" data-off="white">
          <p class="off-title">Beyaz Toplanan</p>
          <p id="off-white-count" class="off-count">0 / 15</p>
          <div id="off-white-stack" class="off-stack" aria-hidden="true"></div>
        </aside>
      </section>

      <aside class="right-action-panel">
        <button type="button" class="action-btn action-invite">Davet Et</button>
        <button type="button" class="action-btn action-soft">Ikiye Katla</button>
        <button type="button" class="action-btn action-soft">Pas Et</button>
        <button id="roll-btn" class="action-btn action-roll">Zar At</button>
        <button type="button" class="action-btn action-soft">Zari Devret</button>
        <button id="undo-btn" class="action-btn action-soft">Geri Al</button>

        <div class="mini-profile-card">
          <p class="mini-profile-name">misafir.r</p>
          <p class="mini-profile-score">0</p>
        </div>
      </aside>
    </section>

    <section class="activity-wrap">
      <section class="history-card">
        <div class="chat-tabs">
          <button type="button" class="chat-tab active">Masa Chat</button>
          <button type="button" class="chat-tab">Lobi Chat</button>
        </div>
        <div class="chat-input-row">
          <input type="text" class="chat-input" placeholder="Mesaj yaz..." aria-label="Mesaj yaz" disabled>
          <button type="button" class="chat-send-btn" disabled>Gonder</button>
        </div>
        <ol id="move-log" class="move-log"></ol>
      </section>

      <section class="help player-list-card">
        <p class="player-list-title">Oyuncular</p>
        <p class="player-list-item"><span>misafir</span><strong>1500</strong></p>
      </section>
    </section>
  </main>
  <section id="winner-modal" class="winner-modal" hidden>
    <div class="winner-card" role="dialog" aria-modal="true" aria-label="Kazanan">
      <p class="winner-title">Tebrikler!</p>
      <p id="winner-text" class="winner-text"></p>
      <button id="winner-close-btn" type="button" class="primary-btn">Kapat</button>
    </div>
  </section>
  <script>
    const params = new URLSearchParams(window.location.search);
    const initialMode = params.get("mode");
    window.__BOOT_MODE__ = initialMode === "bot" ? "bot" : "local";
  </script>
  <script src="./script.js"></script>
</body>
</html>
