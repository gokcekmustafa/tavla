name = "tavla"
main = "worker/index.ts"
compatibility_date = "2026-04-18"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RealtimeRoom" },
  { name = "AUTH", class_name = "AuthStore" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AuthStore"]
